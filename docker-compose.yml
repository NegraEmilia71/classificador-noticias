version: '3.8'

services:
  api:
    build: .
    container_name: classificador-noticias
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    environment:
      - PYTHONUNBUFFERED=1
      - MODEL_PATH=/app/models/news_classifier.pkl
      - VECTORIZER_PATH=/app/models/tfidf_vectorizer.pkl
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
